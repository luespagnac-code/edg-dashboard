<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Espacio de Genios</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1" integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ" crossorigin="anonymous"></script>
<style>
:root{
  --bg:#f0f2f7;--card:#fff;--hdr:#1a1036;--text:#1e1e2e;--muted:#6b7280;
  --border:#e5e7eb;--pos:#10b981;--neg:#ef4444;--gap:16px;--r:12px;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);
  --ig:#E1306C;--fb:#1877F2;--ads:#00C49A;--acc:#6c3ee8;--gads:#4285F4;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* HEADER */
.hdr{background:var(--hdr);padding:0 28px;display:flex;align-items:center;justify-content:space-between;min-height:58px;gap:12px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--ig),var(--acc));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.hdr h1{color:#fff;font-size:16px;font-weight:700}
.hdr p{color:rgba(255,255,255,.5);font-size:11px}
.hdr-brand{color:rgba(255,255,255,.5);font-size:12px}

/* STICKY BAR */
.sticky{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;gap:12px;flex-wrap:wrap;min-height:50px}

/* TABS */
.tabs{display:flex;gap:2px}
.tab{padding:8px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.tab.active[data-t=instagram]{color:var(--ig);border-bottom-color:var(--ig)}
.tab.active[data-t=facebook]{color:var(--fb);border-bottom-color:var(--fb)}
.tab.active[data-t=ads]{color:var(--ads);border-bottom-color:var(--ads)}
.tab.active[data-t=gads]{color:var(--gads);border-bottom-color:var(--gads)}
.kpi.gads{border-top-color:var(--gads)}
.pbadge.gads{background:rgba(66,133,244,.1);color:var(--gads);border-color:rgba(66,133,244,.2)}

/* MONTH MULTI-PICKER */
.months{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.months span{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.mbtn{padding:4px 14px;border-radius:20px;border:1.5px solid var(--border);background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);transition:all .15s;user-select:none}
.mbtn:hover{border-color:var(--acc);color:var(--acc)}
.mbtn.sel{background:var(--acc);border-color:var(--acc);color:#fff}

/* PANELS */
.main{max-width:1380px;margin:0 auto;padding:24px 28px 48px}
.panel{display:none}
.panel.active{display:block}

/* PERIOD BADGE */
.pbadge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:20px;background:rgba(108,62,232,.1);color:var(--acc);border:1px solid rgba(108,62,232,.2)}
.pbadge.ig{background:rgba(225,48,108,.1);color:var(--ig);border-color:rgba(225,48,108,.2)}
.pbadge.fb{background:rgba(24,119,242,.1);color:var(--fb);border-color:rgba(24,119,242,.2)}
.pbadge.ads{background:rgba(0,196,154,.1);color:var(--ads);border-color:rgba(0,196,154,.2)}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:var(--gap);margin-bottom:24px}
.kpi{background:var(--card);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow);border-top:3px solid var(--border)}
.kpi.ig{border-top-color:var(--ig)}.kpi.fb{border-top-color:var(--fb)}
.kpi.tt{border-top-color:var(--tt)}.kpi.ads{border-top-color:var(--ads)}.kpi.acc{border-top-color:var(--acc)}
.kpi-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.kpi-val{font-size:24px;font-weight:800;color:var(--text);line-height:1.1}
.kpi-prev{font-size:11px;color:var(--muted);margin-top:3px}
.kpi-chg{font-size:12px;font-weight:600;margin-top:4px}
.kpi-chg.up{color:var(--pos)}.kpi-chg.down{color:var(--neg)}.kpi-chg.neu{color:var(--muted)}

/* SECTION HEADER */
.sec{margin:28px 0 14px;display:flex;align-items:center;gap:10px}
.sec-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);white-space:nowrap}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.r-divider{margin:32px 0;border:none;border-top:2px solid var(--border);border-radius:2px}

/* GRIDS */
.g1{display:grid;grid-template-columns:1fr;gap:var(--gap);margin-bottom:var(--gap)}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--gap);margin-bottom:var(--gap)}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap);margin-bottom:var(--gap)}

/* CHART CARD */
.cc{background:var(--card);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow)}
.cc-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.cc-sub{font-size:11px;color:var(--muted);margin-bottom:14px}

/* NO PREV */
.no-prev{display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);font-weight:500;gap:8px;height:100%}

.coming-soon{text-align:center;padding:40px;background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);color:var(--muted);margin-top:16px}

/* RESUMEN TABLE */
.rtable-wrap{overflow-x:auto;margin-top:4px}
.rtable{width:100%;border-collapse:collapse;font-size:13px}
.rtable th{padding:9px 14px;text-align:left;border-bottom:2px solid var(--border);color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;background:#fafafa}
.rtable td{padding:9px 14px;border-bottom:1px solid var(--border)}
.rtable tr:last-child td{border-bottom:none}
.rtable tr:hover td{background:#fafbff}
.rtable .row-head{font-weight:700;color:var(--text)}
.rtable .section-row td{background:#f5f6fa;font-weight:700;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding-top:14px}
.rtable .total-row td{font-weight:800;background:#f0f2f7;border-top:2px solid var(--border)}
.pill-sm{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700}
.pill-ig{background:#fce7ef;color:var(--ig)}.pill-fb{background:#e8f1ff;color:var(--fb)}.pill-ads{background:#e0faf4;color:var(--ads)}
.empty-val{color:#c4c4c4;font-style:italic}

/* PENDIENTE NOTICE */
.pend-note{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* REFRESH BTN */
.refresh-btn{padding:5px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap}
.refresh-btn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.5)}
.last-upd{font-size:11px;color:rgba(255,255,255,.4);margin-left:6px}

/* INSIGHT / NEXT STEPS */
.insight-block,.nextsteps-block{background:var(--card);border-radius:var(--r);padding:20px 24px;box-shadow:var(--shadow)}
.insight-block{border-left:4px solid var(--ig)}
.nextsteps-block{border-left:4px solid #10b981}
.block-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.insight-block .block-label{color:var(--ig)}
.nextsteps-block .block-label{color:#10b981}
.block-text{font-size:13px;color:var(--text);line-height:1.75;white-space:pre-line}
.no-text{font-size:13px;color:var(--muted);font-style:italic}

/* CONTENIDOS TABLE */
.cont-link{color:var(--ig);text-decoration:none;font-weight:600}
.cont-link:hover{text-decoration:underline}
.badge-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--ig);color:#fff;font-size:11px;font-weight:700}

@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}.sticky{padding:0 14px}.main{padding:16px}}
@media print{.sticky{display:none}.hdr{print-color-adjust:exact}.cc{break-inside:avoid}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo">🧠</div>
    <div><h1>Espacio de Genios · Dashboard de Marketing</h1><p>Reporte mensual de redes sociales · 2026</p></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="refresh-btn" onclick="doRefresh()">🔄 Actualizar</button>
    <span class="last-upd" id="last-upd"></span>
  </div>
</header>

<div class="sticky">
  <nav class="tabs">
    <button class="tab active" data-t="resumen"   onclick="setTab('resumen')">📊 Resumen</button>
    <button class="tab"        data-t="instagram" onclick="setTab('instagram')">📷 Instagram</button>
    <button class="tab"        data-t="facebook"  onclick="setTab('facebook')">📘 Facebook</button>
    <button class="tab"        data-t="ads"       onclick="setTab('ads')">📣 Meta Ads</button>
    <button class="tab"        data-t="gads"      onclick="setTab('gads')">🔍 Google Ads</button>
  </nav>
  <div class="months">
    <span>Período:</span>
    <button class="mbtn sel" data-i="0" onclick="toggleMonth(0)">Enero</button>
    <button class="mbtn sel" data-i="1" onclick="toggleMonth(1)">Febrero</button>
    <button class="mbtn sel" data-i="2" onclick="toggleMonth(2)">Marzo</button>
  </div>
</div>

<main class="main">

  <div id="p-facebook"  class="panel"></div>
  <div id="p-ads"       class="panel"></div>

const pct=(a,b)=>(!b||b===0)?null:((a-b)/b)*100;

  if(v===null||v===undefined) return `<div class="kpi ${cls}"><div class="kpi-label">${label}</div><div class="kpi-val">—</div><div class="kpi-chg neu">Sin datos</div></div>`;
  const fFn=fmt==='money'?f$:fmt==='pct'?(n=>n==null?'—':fN(n,1)+'%'):fK;
  const chg=(pv!=null)?pct(v,pv):null;
  const chgHtml=chg!==null?`<div class="kpi-chg ${chg>=0?'up':'down'}">${chg>=0?'▲':'▼'} ${chg>=0?'+':''}${chg.toFixed(1)}% vs ${MO[p]}</div>`:`<div class="kpi-chg neu">${pv==null?'Sin datos previos':'Primer mes'}</div>`;
  const prevHtml=pv!=null?`<div class="kpi-prev">${MO[p]}: ${fFn(pv)}</div>`:'';
  return `<div class="kpi ${cls}"><div class="kpi-label">${label}</div><div class="kpi-val">${fFn(v)}</div>${prevHtml}${chgHtml}</div>`;
}

const sec=(t)=>`<div class="sec"><span class="sec-title">${t}</span></div>`;
const cc=(id,title,sub,h=265)=>`<div class="cc"><div class="cc-title">${title}</div><div class="cc-sub">${sub}</div><div style="position:relative;height:${h}px"><canvas id="${id}"></canvas></div></div>`;

// ── CHART ENGINE ──────────────────────────────────────────────────────────
const C={ig:'#E1306C',igL:'rgba(225,48,108,.15)',fb:'#1877F2',fbL:'rgba(24,119,242,.15)',
  ads:'#00C49A',adsL:'rgba(0,196,154,.15)',acc:'#6c3ee8',accL:'rgba(108,62,232,.15)',
  prev:'rgba(160,160,160,.3)',prevB:'rgba(160,160,160,.65)',
  pal:['#6c3ee8','#00C49A','#3b82f6','#f59e0b','#8b5cf6','#ef4444']};

function mk(id,cfg){
  if(CHS[id]){try{CHS[id].destroy()}catch(e){}delete CHS[id];}
  const el=document.getElementById(id); if(!el)return;
  CHS[id]=new Chart(el.getContext('2d'),cfg);
}
function destroyAll(){Object.values(CHS).forEach(c=>{try{c.destroy()}catch(e){}});Object.keys(CHS).forEach(k=>delete CHS[k]);}

function showNP(id){
  const el=document.getElementById(id); if(!el)return;
  el.parentElement.innerHTML=`<div class="no-prev">📅 Seleccioná al menos 2 meses para ver la comparativa</div>`;
}

// Grouped bar chart using SEL months (Resumen comparisons)
function gBar(id,datasets,fmtCb){
  const labels=selLbls();

// Grouped bar prev vs current (last 2 in SEL)
function compBar(id,metrics,color){
  const p=prevM(); if(p===null){showNP(id);return;}
  const m=lastM();
  mk(id,{type:'bar',data:{labels:metrics.map(x=>x.label),datasets:[
    {label:MO[p],data:metrics.map(x=>x.data[p]??0),backgroundColor:C.prev,borderColor:C.prevB,borderWidth:1.5,borderRadius:4},
    {label:MO[m],data:metrics.map(x=>x.data[m]??0),backgroundColor:color+'BB',borderColor:color,borderWidth:1.5,borderRadius:4},
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{position:'top',labels:{usePointStyle:true,padding:14,font:{size:11}}},
      tooltip:{callbacks:{label(ctx){
        const v=ctx.parsed.y; const m2=metrics[ctx.dataIndex];
        const other=ctx.datasetIndex===1&&m2?m2.data[p]:null;
        const chg=ctx.datasetIndex===1&&other?pct(v,other):null;
        return ` ${ctx.dataset.label}: ${fK(v)}${chg!==null?' ('+( chg>=0?'+':'')+chg.toFixed(1)+'%)':''}`;
      }}}},
    scales:{x:{grid:{display:false}},y:{beginAtZero:true,ticks:{callback:v=>fK(v),font:{size:11}}}}}});
}

// % change bar (horizontal)
function pctBar(id,metrics,color){
  const p=prevM(); if(p===null){showNP(id);return;}
  const m=lastM();
  const vals=metrics.map(x=>{const c=x.data[m]??0,pv=x.data[p]??0; return pv===0?0:parseFloat(((c-pv)/pv*100).toFixed(1));});
  mk(id,{type:'bar',data:{labels:metrics.map(x=>x.label),datasets:[{
    label:`Variación vs ${MO[p]}`,data:vals,
    backgroundColor:vals.map(v=>v>=0?'rgba(16,185,129,.7)':'rgba(239,68,68,.7)'),
    borderColor:vals.map(v=>v>=0?'#10b981':'#ef4444'),borderWidth:1.5,borderRadius:4,
  }]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label(ctx){const v=ctx.parsed.x;return ` ${v>=0?'+':''}${v}%`;} }}},
    scales:{x:{ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'rgba(0,0,0,.05)'}},
      y:{grid:{display:false},ticks:{font:{size:12}}}}}});
}

// Stacked bar (always all months)
function stackedBar(id,datasets,fmtCb){

// Donut
function donut(id,labels,data,colors){
  mk(id,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors||C.pal,borderColor:'#fff',borderWidth:2}]},

  // Suma meses seleccionados de un array
  const selSum=(arr)=>SEL.reduce((s,i)=>s+(arr[i]??0),0);
  // Label del período
  const fPeriod=()=>SEL.length===1?MO[SEL[0]]:`${MO[SEL[0]]} – ${MO[SEL[SEL.length-1]]}`;

  // KPI universal: 1 mes → valor de ese mes + comparativa; varios meses → suma del período
  const kpiAuto=(label,data,fmt,cls,color)=>{
    const fFn=fmt==='money'?f$:fmt==='pct'?(n=>n==null?'—':fN(n,1)+'%'):fK;
    const style=color?`style="border-top-color:${color}"`:'';
    if(SEL.length===1){
      // Un mes: mostrar valor + comparativa vs mes anterior en el array
      const idx=SEL[0];
      const v=data[idx];
      const pidx=idx>0?idx-1:null;
      const pv=pidx!==null?data[pidx]:null;
      if(v==null||v===undefined) return `<div class="kpi ${cls}" ${style}><div class="kpi-label">${label}</div><div class="kpi-val">—</div><div class="kpi-chg neu">Sin datos</div></div>`;
      const chg=pv!=null?pct(v,pv):null;
      const chgHtml=chg!==null
        ?`<div class="kpi-chg ${chg>=0?'up':'down'}">${chg>=0?'▲':'▼'} ${chg>=0?'+':''}${chg.toFixed(1)}% vs ${MO[pidx]}</div>`
        :`<div class="kpi-chg neu">Sin mes anterior</div>`;
      const prevHtml=pv!=null?`<div class="kpi-prev">${MO[pidx]}: ${fFn(pv)}</div>`:'';
      return `<div class="kpi ${cls}" ${style}><div class="kpi-label">${label}</div><div class="kpi-val">${fFn(v)}</div>${prevHtml}${chgHtml}</div>`;
    } else {
      // Varios meses: mostrar suma del período
      const total=selSum(data);
      const valHtml=total==null||isNaN(total)?'—':fFn(total);
      return `<div class="kpi ${cls}" ${style}><div class="kpi-label">${label}</div><div class="kpi-val">${valHtml}</div><div class="kpi-chg neu">Total: ${fPeriod()}</div></div>`;

// Helper: table row
function rRow(label,data,fmt,pillCls){
  const isEmpty=data.every(v=>v===null||v===undefined);
  const fFn=fmt==='money'?f$:fmt==='pct'?v=>v==null?'—':fN(v,1)+'%':fK;
  const cells=MO.map((_,i)=>{
    const v=data[i];
    return `<td>${v==null||v===undefined?'<span class="empty-val">—</span>':fFn(v)}</td>`;
  }).join('');
  const lbl=pillCls?`<span class="pill-sm ${pillCls}"></span> ${label}`:label;
  return `<tr><td class="row-head">${lbl}</td>${cells}</tr>`;
}

// CSV parser — handles quoted fields (including multiline)
function parseCSV(txt){
  const rows=[]; let row=[],cell='',inQ=false;
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(inQ){if(c==='"'&&txt[i+1]==='"'){cell+='"';i++;}else if(c==='"'){inQ=false;}else{cell+=c;}}
    else{
      if(c==='"'){inQ=true;}
      else if(c===','){row.push(cell);cell='';}
      else if(c==='\r'&&txt[i+1]==='\n'){row.push(cell);rows.push(row);row=[];cell='';i++;}
      else if(c==='\n'||c==='\r'){row.push(cell);rows.push(row);row=[];cell='';}
      else{cell+=c;}
    }
  }
  if(row.length||cell){row.push(cell);rows.push(row);}
  return rows;
}

// Find FIRST row by label (col 1 match, trimmed, case-insensitive)
function rbl(rows,lbl){
  return rows.find(r=>(r[1]||'').trim().toLowerCase()===lbl.trim().toLowerCase())||[];
}
// Find LAST row by label — used for INSIGHT/NEXT STEPS that have a header row + data row
function rblLast(rows,lbl){
  const matches=rows.filter(r=>(r[1]||'').trim().toLowerCase()===lbl.trim().toLowerCase());
  return matches[matches.length-1]||[];
}

// Extract numbers from active column indices
function nums(row,cols){return cols.map(c=>{const raw=(row[c]||'').replace(/[$,%]/g,'').replace(/,/g,'').trim();if(!raw)return null;const n=parseFloat(raw);return isNaN(n)?null:n;});}

// Extract text strings from active column indices
function txts(row,cols){return cols.map(c=>(row[c]||'').trim());}

// Parse "Nombre url" string into separate components
function parseNL(t){const m=t.match(/https?:\/\/\S+/);return{nombre:(t.replace(m?m[0]:'','').replace(/[-–]\s*$/,'').trim()||t),link:m?m[0]:''};}

      ${kpi('Conversiones',d.conv,'k','gads')}
      ${kpi('CPA ($)',d.cpa,'money','gads')}
      ${kpi('CVR (%)',d.cvr,'pct','gads')}
    </div>
    <div class="g3">
      ${cc('g-'+c.id+'-inv','Inversión ($)','Meses seleccionados',200)}
      ${cc('g-'+c.id+'-clics','Clics','Meses seleccionados',200)}
      ${cc('g-'+c.id+'-conv','Conversiones','Meses seleccionados',200)}
    </div>
    <div class="g3">
      ${cc('g-'+c.id+'-ctr','CTR (%)','Click-through rate',190)}
      ${cc('g-'+c.id+'-cpc','CPC ($)','Costo por clic',190)}
      ${cc('g-'+c.id+'-cpa','CPA ($)','Costo por conversión',190)}
    </div>`;
  }).join('');

  const insightTxt=D.gads.insights[m]  || 'Sin datos para este mes.';
  const nextTxt   =D.gads.nextSteps[m] || 'Sin datos para este mes.';

  document.getElementById('p-gads').innerHTML=`
    <div class="pbadge gads">🔍 ${MO[m]}${p!==null?' · vs '+MO[p]:' · primer mes'}</div>

    ${sec('💰 Inversión Total Google Ads')}
    <div class="kpi-grid" style="grid-template-columns:repeat(auto-fit,minmax(190px,1fr))">
      ${kpi('Inversión Total ($)',D.gads.invTotal,'money','gads')}
      ${kpi('Search Tienda ($)',D.gads.invSearch,'money','gads')}
      ${kpi('Shopping ($)',D.gads.invShop,'money','gads')}
      ${kpi('Search Proyecto ($)',D.gads.invProy,'money','gads')}
    </div>

    ${campSections}

    ${sec('Insights · '+MO[m])}
    <div class="g2">
      <div class="insight-block">
        <div class="block-label">💡 Insight</div>
        <div class="block-text">${insightTxt}</div>
      </div>
      <div class="nextsteps-block">
        <div class="block-label">🎯 Next Steps</div>
        <div class="block-text">${nextTxt}</div>
      </div>
    </div>`;

  // Render charts per campaign
  CAMPS_G.forEach(c=>{
    const d=D.gads.camps[c.dk];
    gBar('g-'+c.id+'-inv',  [{label:'Inversión ($)',  data:d.inv,  color:c.col}], v=>'$'+fK(v));
    gBar('g-'+c.id+'-clics',[{label:'Clics',          data:d.clics,color:c.col}]);
    gBar('g-'+c.id+'-conv', [{label:'Conversiones',   data:d.conv, color:c.col}]);
    gBar('g-'+c.id+'-ctr',  [{label:'CTR (%)',         data:d.ctr,  color:c.col}], v=>fN(v,2)+'%');
    gBar('g-'+c.id+'-cpc',  [{label:'CPC ($)',         data:d.cpc,  color:c.col}], v=>'$'+fN(v,2));
    gBar('g-'+c.id+'-cpa',  [{label:'CPA ($)',         data:d.cpa,  color:c.col}], v=>'$'+fN(v,2));
  });
}

// Main fetch-and-update function
async function loadSheetData(){
  const el=document.getElementById('last-upd');
  if(el)el.textContent='⏳ Actualizando...';

  // Si se abre desde file://, los navegadores bloquean los fetch HTTP (CORS)
  if(window.location.protocol==='file:'){
    if(el){
      el.textContent='';
      el.innerHTML='⚠️ Abrí el archivo desde el servidor — <a href="#" onclick="showFileHelp();return false;" style="color:rgba(255,255,255,.7)">¿cómo?</a>';
    }
    destroyAll(); RENDERS[TAB](); return;
  }

  try{
    const results=await Promise.allSettled(
      [GIDS.ig,GIDS.fb,GIDS.ads,GIDS.res,GIDS.gads].map(id=>
        fetch(csvUrl(id)).then(r=>{if(!r.ok)throw new Error(r.status);return r.text();})
      )
    );
    const ok=results.map(r=>r.status==='fulfilled');
    const [igT,fbT,adsT,resT,gadsT]=results.map(r=>r.status==='fulfilled'?r.value:null);
    const failCount=ok.filter(v=>!v).length;
    if(failCount===5){throw new Error('Todos los sheets fallaron');}

    const ig=igT?parseCSV(igT):null;
    const fb=fbT?parseCSV(fbT):null;
    const ads=adsT?parseCSV(adsT):null;
    const res=resT?parseCSV(resT):null;
    const gads=gadsT?parseCSV(gadsT):null;
    const ac=detectMonths(); // siempre [2..13]

    // ── Instagram
    if(ig&&ac){
      D.ig.views   =nums(rbl(ig,'Visualizaciones (views)'),ac);
      D.ig.alcance =nums(rbl(ig,'Cuentas alcanzadas'),ac);
      D.ig.inter   =nums(rbl(ig,'Interacciones totales'),ac);
      D.ig.seg     =nums(rbl(ig,'Crecimiento de seguidores'),ac);
      D.ig.visitas =nums(rbl(ig,'Visitas al perfil'),ac);
      D.ig.clics   =nums(rbl(ig,'Clics al botón de bio'),ac);
      D.ig.intSeg  =nums(rbl(ig,'Interacciones de seguidores'),ac);
      D.ig.intNoSeg=nums(rbl(ig,'Interacciones de no seguidores'),ac);
      D.ig.lkReels =nums(rbl(ig,'Likes en Reels'),ac);
      D.ig.cmReels =nums(rbl(ig,'Comentarios en Reels'),ac);
      D.ig.gdReels =nums(rbl(ig,'Guardados en Reels'),ac);
      D.ig.rpReels =nums(rbl(ig,'Repost en Reels'),ac);
      D.ig.shReels =nums(rbl(ig,'Compartidos en Reels'),ac);
      D.ig.lkPosts =nums(rbl(ig,'Likes en Posts'),ac);
      D.ig.gdPosts =nums(rbl(ig,'Guardados en Posts'),ac);
      D.ig.shPosts =nums(rbl(ig,'Compartidos en Post'),ac);
      const iN1=txts(rbl(ig,'Nombre y link contenido #1'),ac);
      const iN2=txts(rbl(ig,'Nombre y link contenido #2'),ac);
      D.ig.cont=[
        {nombre:iN1.map(t=>parseNL(t).nombre),link:iN1.map(t=>parseNL(t).link),
         views:nums(rbl(ig,'Views contenido #1'),ac),likes:nums(rbl(ig,'Likes contenido #1'),ac)},
        {nombre:iN2.map(t=>parseNL(t).nombre),link:iN2.map(t=>parseNL(t).link),
         views:nums(rbl(ig,'Views contenido #2'),ac),likes:nums(rbl(ig,'Likes contenido #2'),ac)},
      ];
      D.ig.insights =txts(rblLast(ig,'INSIGHT'),ac);
      D.ig.nextSteps=txts(rblLast(ig,'NEXT STEPS'),ac);
    }

    // ── Facebook
    if(fb&&ac){
      D.fb.esp    =nums(rbl(fb,'Espectadores únicos'),ac);
      D.fb.views  =nums(rbl(fb,'Visualizaciones totales'),ac);
      D.fb.seg    =nums(rbl(fb,'Crecimiento de seguidores'),ac);
      D.fb.inter  =nums(rbl(fb,'Interacciones totales'),ac);
      D.fb.repro3s=nums(rbl(fb,'Reproducciones +3s'),ac);
      D.fb.clics  =nums(rbl(fb,'Clics en enlace'),ac);
      D.fb.reels  =nums(rbl(fb,'Interacciones en Reels'),ac);
      D.fb.foto   =nums(rbl(fb,'Interacciones en Foto'),ac);
      D.fb.story  =nums(rbl(fb,'Interacciones en Story'),ac);
      const fN1=txts(rbl(fb,'Nombre y link de contenido #1'),ac);
      const fN2=txts(rbl(fb,'Nombre y link contenido #2'),ac);
      D.fb.cont=[
        {nombre:fN1.map(t=>parseNL(t).nombre),link:fN1.map(t=>parseNL(t).link),
         views:nums(rbl(fb,'Views contenido #1'),ac),likes:nums(rbl(fb,'Interacciones contenido #1'),ac)},
        {nombre:fN2.map(t=>parseNL(t).nombre),link:fN2.map(t=>parseNL(t).link),
         views:nums(rbl(fb,'Views contenido #2'),ac),likes:nums(rbl(fb,'Interacciones contenido #2'),ac)},
      ];
      D.fb.insights =txts(rblLast(fb,'INSIGHT'),ac);
      D.fb.nextSteps=txts(rblLast(fb,'NEXT STEPS'),ac);
    }


    // ── Meta Ads
    if(ads&&ac){
      D.ads.inv=nums(rbl(ads,'Inversión total ($)'),ac);
      D.ads.invTotal =nums(rbl(ads,'Inversión total ($)'),ac);
      D.ads.invCentro=nums(rbl(ads,'Inversión Centro ($)'),ac);
      D.ads.invProy  =nums(rbl(ads,'Inversion Proyecto ($)'),ac);
      Object.assign(D.ads.camps,extractAdsCamps(ads,ac));
      D.ads.alcTotal=MO.map((_,i)=>Object.values(D.ads.camps).reduce((s,c)=>s+(c.alc[i]||0),0));
      D.ads.insights =ac.map(c=>(rblLast(ads,'INSIGHT')[c]||'').trim());
      D.ads.nextSteps=ac.map(c=>(rblLast(ads,'NEXT STEPS')[c]||'').trim());
    }

    // ── Google Ads
    if(gads&&ac){
      D.gads.invTotal =nums(rbl(gads,'Inversión total ($)'),ac);
      D.gads.invSearch=nums(rbl(gads,'Inversion Search Tienda ($)'),ac);
      D.gads.invShop  =nums(rbl(gads,'Inversion Shopping ($)'),ac);
      D.gads.invProy  =nums(rbl(gads,'Inversion Search Proyecto ($)'),ac);
      Object.assign(D.gads.camps, extractGadsCamps(gads,ac));
      D.gads.insights =ac.map(c=>(rblLast(gads,'INSIGHT')[c]||'').trim());
      D.gads.nextSteps=ac.map(c=>(rblLast(gads,'NEXT STEPS')[c]||'').trim());
    }

    // ── Centro y Proyecto
    if(res&&ac){
      D.centro.inv      =nums(rbl(res,'Inversion total ($)'),ac);
      D.centro.pk_cant  =nums(rbl(res,'Pre-Kinder (Cantidad)'),ac);
      D.centro.pk_monto =nums(rbl(res,'Pre-Kinder ($)'),ac);
      D.centro.ter_cant =nums(rbl(res,'Terapias individuales (Cantidad)'),ac);
      D.centro.ter_monto=nums(rbl(res,'Terapias individuales ($)'),ac);
      D.centro.valor    =nums(rbl(res,'Valoraciones ($)'),ac);
      D.centro.capac    =nums(rbl(res,'Capacitaciones ($)'),ac);
      D.centro.total    =nums(rbl(res,'TOTAL CENTRO ($)'),ac);
      D.proy.inv    =nums(rblLast(res,'Inversion Total ($)'),ac);
      D.proy.leads  =nums(rbl(res,'Interesados (leads recibidos)'),ac);
      D.proy.presup =nums(rbl(res,'Presupuestos enviados'),ac);
      D.proy.cierres=nums(rbl(res,'Cierres concretados'),ac);
      D.proy.tasa   =ac.map(c=>{
        const v=(rblLast(res,'Tasa de cierre (%)')[c]||'').replace('%','').trim();
        const n=parseFloat(v); return isNaN(n)?null:n;
      });
    }

    updateMonthUI(); // reconstruir botones con datos ya cargados
    destroyAll();
    RENDERS[TAB]();
    const now=new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    if(el)el.textContent= failCount>0
      ? `⚠️ ${5-failCount}/5 sheets cargados · ${now}`
      : `✅ Actualizado ${now}`;
  }catch(e){
    console.error('Sheet error:',e);
    if(el)el.textContent='⚠️ Error al cargar — revisá tu conexión y hacé clic en 🔄 Actualizar';
    destroyAll(); RENDERS[TAB]();
  }
}

// ── ROUTING ───────────────────────────────────────────────────────────────
const RENDERS={resumen:rResumen,instagram:rInstagram,facebook:rFacebook,ads:rAds,gads:rGads};

function doRefresh(){
  loadSheetData();
}

function showFileHelp(){
  alert('Para que el dashboard se conecte al sheet, hay que abrirlo desde un servidor local:\n\n1. Abrí la Terminal\n2. Escribí:\n   cd ~/EDG\n   python3 -m http.server 8080\n3. Abrí en el navegador:\n   http://localhost:8080/dashboard_espacio_de_genios.html\n\nSi ya hiciste eso y sigue fallando, verificá que el Google Sheet esté publicado en la web (Archivo → Compartir → Publicar en la web).');
}

function setTab(t){
  TAB=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='p-'+t));
  destroyAll(); RENDERS[t]();
}

function toggleMonth(i){
  if(SEL.includes(i)){
    if(SEL.length===1)return; // keep at least 1
    SEL=SEL.filter(x=>x!==i);
  } else {
    SEL=[...SEL,i].sort((a,b)=>a-b);
  }
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.toggle('sel',SEL.includes(+b.dataset.i)));
  destroyAll(); RENDERS[TAB]();
}

// INIT — render con datos hardcoded primero, luego fetch del sheet
RENDERS[TAB]();
loadSheetData();
</script>
